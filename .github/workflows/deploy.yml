name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (default: git SHA)'
        required: false

env:
  REGISTRY: ${{ secrets.SCW_REGISTRY_ENDPOINT }}
  IMAGE: ${{ secrets.SCW_REGISTRY_ENDPOINT }}/erfahre-api
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Container-ID aus Scaleway: tofu output -raw container_id
  CONTAINER_ID: ${{ secrets.SCW_CONTAINER_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Assets aus erfahre-assets auschecken
        uses: actions/checkout@v5
        with:
          repository: openzirndorf/erfahre-assets
          token: ${{ secrets.ASSETS_TOKEN }}
          path: _assets

      - name: Assets einkopieren
        run: |
          cp _assets/challenges.json backend/challenges.json
          cp _assets/images/*.png    frontend/public/images/ 2>/dev/null || true
          cp _assets/images/*.jpg    frontend/public/images/ 2>/dev/null || true
          cp _assets/images/*.webp   frontend/public/images/ 2>/dev/null || true
          cp _assets/images/*.jpg    frontend/public/images/ 2>/dev/null || true

      - name: Set image tag
        id: tag
        run: echo "tag=${{ github.event.inputs.tag || github.sha }}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Scaleway Registry
        run: echo "${{ secrets.SCW_SECRET_KEY }}" | docker login $REGISTRY -u nologin --password-stdin

      - name: Build image (with layer cache)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          platforms: linux/amd64
          load: true
          push: false
          tags: ${{ env.IMAGE }}:${{ steps.tag.outputs.tag }}
          build-args: APP_VERSION=${{ steps.tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push image
        timeout-minutes: 10
        run: |
          for i in 1 2 3; do
            timeout 300 docker push $IMAGE:${{ steps.tag.outputs.tag }} && break
            echo "Push attempt $i failed, retrying in 20s..."
            sleep 20
          done

      - name: Datenbank-Orte aktualisieren
        run: |
          docker run --rm \
            -e SECRET_KEY="${{ secrets.APP_SECRET_KEY }}" \
            -e ADMIN_TOKEN="${{ secrets.APP_ADMIN_TOKEN }}" \
            -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            -v ${{ github.workspace }}/_assets/challenges.json:/app/challenges.json:ro \
            $IMAGE:${{ steps.tag.outputs.tag }} \
            python3 seed.py --sync

      - name: Deploy container via Scaleway API
        run: |
          TAG=${{ steps.tag.outputs.tag }}
          # Container-ID aus Secrets robust normalisieren: akzeptiert reine UUID
          # oder Werte wie "fr-par/<uuid>".
          ID=$(printf '%s' "$CONTAINER_ID" | grep -Eo '[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}' | tail -n 1 || true)
          if [ -z "$ID" ]; then
            echo "SCW_CONTAINER_ID muss die UUID des Scaleway Containers enthalten."
            echo "Tipp: lokal in infra/ ausführen: tofu output -raw container_id"
            exit 1
          fi
          echo "Container ID: $ID"

          BASE="https://api.scaleway.com/containers/v1/regions/fr-par/containers/$ID"

          # 1. Image aktualisieren
          PATCH_BODY=$(mktemp)
          PATCH_STATUS=$(curl -s -o "$PATCH_BODY" -w "%{http_code}" -X PATCH \
            -H "X-Auth-Token: ${{ secrets.SCW_SECRET_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"image\":\"$IMAGE:$TAG\"}" \
            "$BASE")
          echo "PATCH status: $PATCH_STATUS"
          cat "$PATCH_BODY"
          if [ "${PATCH_STATUS:0:1}" != "2" ]; then
            echo "PATCH fehlgeschlagen (HTTP $PATCH_STATUS)" && exit 1
          fi

          # Der PATCH löst automatisch ein Redeploy aus (status: "updating")
          echo "Done: $IMAGE:$TAG"

      - name: Verify live version
        run: |
          EXPECTED="${{ steps.tag.outputs.tag }}"
          # Scaleway braucht ~30–60s um den neuen Container zu starten
          for i in $(seq 1 18); do
            BODY=$(curl -fsS https://erfahre.openzirndorf.de/api/health || true)
            echo "Health response: $BODY"
            echo "$BODY" | grep -q "\"version\":\"$EXPECTED\"" && exit 0
            sleep 15
          done
          echo "Live app did not report expected version $EXPECTED" && exit 1
